name: Elite Betting System

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - run: pip install requests numpy

    - name: Run system
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python main.py
