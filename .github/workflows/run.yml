name: AI Betting System Elite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # corre diario (puedes cambiar hora)

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests numpy pandas scikit-learn

    - name: Ensure storage exists
      run: |
        mkdir -p storage
        if [ ! -f storage/matches.csv ]; then
          echo "home,away,home_xg,away_xg" > storage/matches.csv
        fi
        if [ ! -f storage/bets.csv ]; then
          echo "match,market,odds,result" > storage/bets.csv
        fi

    - name: Run system
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python main.py

    - name: Commit and push data
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"

        git add storage/*.csv

        git diff --quiet && git diff --staged --quiet || git commit -m "update data"

        git push
