name: AI Betting System

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests numpy pandas scikit-learn

    - name: Create storage folder
      run: mkdir -p storage

    - name: Create CSV files if not exist
      run: |
        if [ ! -f storage/matches.csv ]; then
          echo "home,away,home_xg,away_xg" > storage/matches.csv
        fi
        if [ ! -f storage/bets.csv ]; then
          echo "match,market,odds,result" > storage/bets.csv
        fi

    - name: Run system
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python main.py
